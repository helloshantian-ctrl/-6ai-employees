<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>越南出海投资顾问 · 智能体平台</title>
<meta name="description" content="基于 Claude 的越南出海投资顾问智能体平台 · 目标工作台 + 6 位专业顾问" />
<style>
  :root{
    --paper:#f5f1e8; --paper-2:#efe9dc; --ink:#1c2b27; --ink-soft:#3c4a45;
    --emerald:#0f4d3c; --emerald-2:#13624c; --gold:#b8893b; --gold-soft:#d8b878;
    --terra:#b04a32; --line:#ddd3c0; --muted:#7a7363; --star:#d4a72c;
    --ok:#2f7d54; --shadow:0 1px 0 rgba(0,0,0,.04),0 8px 24px -12px rgba(28,43,39,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased;
    display:flex; min-height:100vh;
  }
  .serif{font-family:Georgia,"Songti SC","STSong",serif;}
  .mono{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;}

  /* ===== Sidebar ===== */
  aside{
    width:264px; background:var(--emerald); color:#eef2ec; display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh; flex-shrink:0;
  }
  .brand{padding:22px 20px 16px; border-bottom:1px solid rgba(255,255,255,.1)}
  .brand .star{color:var(--star); font-size:13px; letter-spacing:.4em}
  .brand h1{font-size:18px; margin:4px 0 2px; font-weight:700; letter-spacing:.5px}
  .brand .en{font-size:9px; letter-spacing:.22em; color:#9fc2b3; text-transform:uppercase}
  nav{flex:1; overflow-y:auto; padding:10px 0}
  .nav-label{font-size:9px; letter-spacing:.2em; color:#86ad9d; padding:14px 20px 6px; text-transform:uppercase}
  .nav-item{
    display:flex; gap:11px; align-items:flex-start; padding:9px 18px; cursor:pointer;
    border-left:2px solid transparent; transition:background .15s; user-select:none;
  }
  .nav-item:hover{background:rgba(255,255,255,.06)}
  .nav-item.active{background:rgba(255,255,255,.1); border-left-color:var(--gold)}
  .nav-item .ic{font-size:17px; line-height:1.3}
  .nav-item .tt{font-size:13.5px; font-weight:600}
  .nav-item .sub{font-size:10.5px; color:#9fc2b3; margin-top:1px; line-height:1.3}
  .side-foot{padding:14px 18px; border-top:1px solid rgba(255,255,255,.1); font-size:10px; color:#86ad9d}
  .side-foot .row{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
  select,.field{
    width:100%; background:rgba(255,255,255,.08); color:#eef2ec; border:1px solid rgba(255,255,255,.16);
    border-radius:7px; padding:7px 9px; font-size:12px; outline:none;
  }
  select option{color:#1c2b27}
  .link{color:var(--gold-soft); cursor:pointer; text-decoration:underline}

  /* ===== Main ===== */
  main{flex:1; display:flex; flex-direction:column; min-width:0}
  .topbar{
    padding:16px 28px; border-bottom:1px solid var(--line); background:var(--paper);
    display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:5;
  }
  .topbar .emoji{font-size:24px}
  .topbar h2{font-size:17px; font-weight:700}
  .topbar p{font-size:12px; color:var(--muted); margin-top:1px}
  .content{flex:1; overflow-y:auto; padding:26px 28px 60px}
  .wrap{max-width:860px; margin:0 auto}

  /* ===== Goal workbench ===== */
  .hero{
    background:linear-gradient(135deg,#fff 0%,var(--paper-2) 100%); border:1px solid var(--line);
    border-radius:14px; padding:24px 26px; box-shadow:var(--shadow); margin-bottom:22px;
  }
  .hero .kicker{font-size:10px; letter-spacing:.2em; color:var(--gold); text-transform:uppercase; font-weight:700}
  .hero h3{font-size:23px; margin:6px 0 6px; line-height:1.25}
  .hero p{font-size:13.5px; color:var(--ink-soft); line-height:1.65}
  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:18px}
  .form-grid .full{grid-column:1/-1}
  label.lbl{display:block; font-size:11.5px; color:var(--muted); margin:0 0 5px; font-weight:600}
  .inp,textarea.inp{
    width:100%; background:#fff; border:1px solid var(--line); border-radius:8px; padding:10px 12px;
    font-size:13.5px; color:var(--ink); outline:none; font-family:inherit; transition:border .15s;
  }
  .inp:focus,textarea.inp:focus{border-color:var(--emerald)}
  textarea.inp{resize:vertical; min-height:74px; line-height:1.6}
  .btn{
    background:var(--emerald); color:#fff; border:none; border-radius:9px; padding:11px 22px;
    font-size:14px; font-weight:600; cursor:pointer; transition:background .15s; font-family:inherit;
  }
  .btn:hover{background:var(--emerald-2)}
  .btn:disabled{opacity:.55; cursor:not-allowed}
  .btn.ghost{background:transparent; color:var(--emerald); border:1px solid var(--emerald)}
  .btn.gold{background:var(--gold)} .btn.gold:hover{background:#a87a30}
  .btn.sm{padding:6px 13px; font-size:12px; border-radius:7px}
  .examples{margin-top:12px; display:flex; flex-wrap:wrap; gap:7px}
  .chip{
    font-size:11.5px; padding:5px 11px; background:#fff; border:1px solid var(--line); border-radius:20px;
    cursor:pointer; color:var(--ink-soft); transition:.15s;
  }
  .chip:hover{border-color:var(--gold); color:var(--ink)}

  /* ===== Plan render ===== */
  .plan-card{background:#fff; border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow); overflow:hidden; margin-top:6px}
  .plan-head{padding:20px 24px; background:linear-gradient(135deg,var(--emerald),var(--emerald-2)); color:#fff}
  .plan-head .summary{font-size:18px; font-weight:700; line-height:1.4; font-family:Georgia,"Songti SC",serif}
  .feas{display:inline-block; margin-top:10px; font-size:12px; padding:4px 12px; border-radius:20px; background:rgba(255,255,255,.16); color:#fff}
  .plan-body{padding:22px 24px}
  .sec{margin-bottom:24px}
  .sec h4{font-size:13px; letter-spacing:.05em; color:var(--emerald); text-transform:uppercase; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px}
  .sec h4::before{content:""; width:18px; height:2px; background:var(--gold)}
  .phase{display:flex; gap:14px; margin-bottom:14px}
  .phase .num{flex-shrink:0; width:28px; height:28px; border-radius:50%; background:var(--paper-2); color:var(--emerald); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; border:1px solid var(--line)}
  .phase .body{flex:1; border-left:2px solid var(--line); padding-left:14px; padding-bottom:6px}
  .phase .pn{font-weight:700; font-size:14.5px}
  .phase .tf{font-size:11px; color:var(--gold); font-weight:600; margin-left:8px}
  .phase .obj{font-size:13px; color:var(--ink-soft); margin:4px 0 7px; line-height:1.55}
  .phase ul{margin:0 0 0 16px; font-size:12.5px; color:var(--ink-soft); line-height:1.7}
  .phase .adv-tags{margin-top:7px; display:flex; flex-wrap:wrap; gap:6px}
  .adv-tag{font-size:10.5px; padding:2px 9px; background:var(--paper-2); border-radius:14px; color:var(--emerald); cursor:pointer; border:1px solid var(--line)}
  .adv-tag:hover{background:var(--gold-soft)}
  .risk{display:flex; gap:10px; padding:10px 0; border-bottom:1px dashed var(--line); font-size:13px}
  .risk:last-child{border:none}
  .risk .r{flex:1; font-weight:600; color:var(--terra)}
  .risk .m{flex:1.4; color:var(--ink-soft); line-height:1.5}
  .pill-list{display:flex; flex-wrap:wrap; gap:8px}
  .pill{font-size:12.5px; padding:6px 13px; background:#faf6ec; border:1px solid var(--gold-soft); border-radius:8px; color:#8a6622}
  .check{display:flex; align-items:flex-start; gap:9px; font-size:13px; padding:5px 0; color:var(--ink-soft); line-height:1.55}
  .check .bx{flex-shrink:0; width:15px; height:15px; border:1.5px solid var(--emerald); border-radius:4px; margin-top:2px}
  .rec-adv{display:flex; gap:12px; padding:12px; background:var(--paper-2); border-radius:10px; margin-bottom:9px; align-items:center}
  .rec-adv .e{font-size:24px}
  .rec-adv .t{flex:1}
  .rec-adv .t .n{font-weight:700; font-size:14px}
  .rec-adv .t .r{font-size:12px; color:var(--ink-soft); margin-top:2px; line-height:1.5}
  .next-step{background:linear-gradient(135deg,#faf6ec,#fff); border:1px solid var(--gold-soft); border-radius:10px; padding:14px 16px; margin-top:6px}
  .next-step .l{font-size:10px; letter-spacing:.15em; color:var(--gold); text-transform:uppercase; font-weight:700}
  .next-step .v{font-size:14.5px; font-weight:600; margin-top:5px; line-height:1.5}
  .timeline-badge{font-size:12px; color:var(--muted); margin-top:8px}

  /* ===== Chat ===== */
  .agent-banner{background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:16px; box-shadow:var(--shadow)}
  .agent-banner .row{display:flex; gap:13px; align-items:center}
  .agent-banner .e{font-size:30px}
  .agent-banner h3{font-size:16px}
  .agent-banner .tag{font-size:12px; color:var(--muted); margin-top:2px}
  .agent-banner .scope{font-size:12px; color:var(--ink-soft); line-height:1.6; margin-top:11px; padding-top:11px; border-top:1px dashed var(--line)}
  .msgs{display:flex; flex-direction:column; gap:14px; margin-bottom:18px}
  .msg{display:flex; gap:11px; max-width:100%}
  .msg .av{flex-shrink:0; width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px}
  .msg.u{flex-direction:row-reverse}
  .msg.u .av{background:var(--emerald); color:#fff}
  .msg.a .av{background:var(--paper-2); border:1px solid var(--line)}
  .bubble{padding:12px 15px; border-radius:12px; font-size:14px; line-height:1.72; max-width:680px}
  .msg.u .bubble{background:var(--emerald); color:#fff}
  .msg.a .bubble{background:#fff; border:1px solid var(--line); box-shadow:var(--shadow)}
  .bubble h3{font-size:15px; margin:10px 0 6px} .bubble h4{font-size:14px; margin:9px 0 5px}
  .bubble p{margin:7px 0} .bubble ul,.bubble ol{margin:7px 0 7px 20px} .bubble li{margin:3px 0}
  .bubble strong{font-weight:700} .bubble code{background:var(--paper-2); padding:1px 5px; border-radius:4px; font-size:12.5px}
  .bubble table{border-collapse:collapse; margin:8px 0; font-size:12.5px; width:100%}
  .bubble th,.bubble td{border:1px solid var(--line); padding:5px 9px; text-align:left}
  .bubble th{background:var(--paper-2)}
  .typing{display:inline-flex; gap:4px} .typing span{width:6px; height:6px; border-radius:50%; background:var(--muted); animation:bl 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.25} 30%{opacity:1}}
  .composer{position:sticky; bottom:0; background:var(--paper); padding-top:10px}
  .composer .box{display:flex; gap:10px; align-items:flex-end; background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px; box-shadow:var(--shadow)}
  .composer textarea{flex:1; border:none; outline:none; resize:none; font-size:14px; font-family:inherit; line-height:1.6; max-height:140px; color:var(--ink)}

  .disclaimer{font-size:11px; color:var(--muted); text-align:center; margin-top:16px; line-height:1.6}
  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--terra); color:#fff; padding:11px 20px; border-radius:8px; font-size:13px; z-index:50; box-shadow:var(--shadow); opacity:0; transition:.25s; pointer-events:none}
  .toast.show{opacity:1}
  .loading-plan{text-align:center; padding:40px; color:var(--muted)}
  .spin{width:30px; height:30px; border:3px solid var(--line); border-top-color:var(--emerald); border-radius:50%; margin:0 auto 14px; animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media(max-width:760px){
    aside{position:fixed; left:-264px; z-index:30; transition:left .2s} aside.open{left:0}
    .form-grid{grid-template-columns:1fr} .menu-btn{display:flex!important}
    .risk{flex-direction:column; gap:3px} .content{padding:18px 16px 60px}
  }
  .menu-btn{display:none; align-items:center; justify-content:center; width:34px; height:34px; border:1px solid var(--line); border-radius:8px; background:#fff; cursor:pointer; font-size:18px}
</style>
</head>
<body>
  <aside id="sidebar">
    <div class="brand">
      <div class="star">★</div>
      <h1 class="serif">越南出海投资顾问</h1>
      <div class="en">Vietnam Advisory · Powered by Claude</div>
    </div>
    <nav id="nav"></nav>
    <div class="side-foot">
      <div class="row"><span>模型</span></div>
      <select id="modelSel">
        <option value="claude-opus-4-8">Opus 4.8 · 最锐利（推荐）</option>
        <option value="claude-sonnet-4-6">Sonnet 4.6 · 均衡提速</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5 · 最省成本</option>
      </select>
      <div class="row" style="margin-top:12px"><span>访问密码（如已设置）</span></div>
      <input id="accessCode" class="field" type="password" placeholder="可留空" autocomplete="off" />
      <div style="margin-top:12px; font-size:9px; color:#86ad9d; line-height:1.6">
        API Key 仅存于服务端 · 仅供参考，非法律/税务意见
      </div>
    </div>
  </aside>

  <main>
    <div class="topbar">
      <div class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</div>
      <div class="emoji" id="tbEmoji">🎯</div>
      <div style="flex:1">
        <h2 id="tbTitle" class="serif">目标工作台</h2>
        <p id="tbDesc">输入出海目标，Claude 拆解为可执行落地路线图</p>
      </div>
    </div>
    <div class="content">
      <div class="wrap" id="view"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

<script>
/* ============================ 顾问智能体定义 ============================ */
const ADVISORS = [
  {
    id:"market-entry", emoji:"🏛️", name:"市场准入与公司注册顾问",
    tag:"IRC/ERC · 外资准入 · 条件性行业",
    scope:"投资注册证（IRC）与企业注册证（ERC）办理流程、外资股比限制、条件性/禁止性行业、经营范围登记、代表处 vs 子公司 vs 合资、WTO 承诺与负面清单。",
    sys:`你是越南「市场准入与公司注册顾问」。深谙越南外商投资准入全流程：投资注册证（IRC）与企业注册证（ERC）的申请材料、时限与计划投资厅（DPI）/工业园管委会的审批路径；外资股比限制与条件性行业（零售、物流、教育、广告等）；《投资法 2020》负面清单与 WTO 入世承诺；代表处、分公司、100% 外资子公司（LLC/JSC）、合资企业的选择权衡；经营范围（VSIC 行业代码）登记。
给出具体、分步、贴合越南实际的指引；涉及时限与费用给参考区间并提示以最新法规与持牌机构为准。中文回答，结构清晰（用小标题与清单）。不提供正式法律意见，复杂事项建议对接当地律所/咨询机构。`
  },
  {
    id:"legal-policy", emoji:"⚖️", name:"法律与外资政策顾问",
    tag:"投资法/企业法 · 土地 · 合规争议",
    scope:"《投资法 2020》《企业法 2020》《土地法》、投资优惠领域与地区、禁止/条件性行业、知识产权、合同与争议解决、合规红线。",
    sys:`你是越南「法律与外资政策顾问」。精通《投资法 2020》《企业法 2020》《土地法 2024》、投资鼓励领域与地区目录、禁止性与条件性投资行业、土地使用权（LUR）与园区租赁、知识产权登记、商事合同要点、争议解决（VIAC 仲裁/法院）、外汇与资本账户合规。
回答须区分「法定要求」与「实操建议」；引用法规时点明名称与大致条款方向，并提醒以现行有效文本为准。中文、结构化。明确这不构成正式法律意见，落地前应由持牌越南律师审核。`
  },
  {
    id:"tax-finance", emoji:"💰", name:"税务与财务顾问",
    tag:"CIT/VAT · 税收优惠 · 利润汇出",
    scope:"企业所得税（标准 20%，优惠 10%/15%/17% 及免税期）、增值税、进出口关税、外国承包商税（FCT）、转让定价、利润汇出与资本金。",
    sys:`你是越南「税务与财务顾问」。熟悉越南税制：企业所得税标准 20%，高新/鼓励领域或地区优惠税率 10%/15%/17% 与「免二减四」式税假；增值税标准 10%（部分阶段性 8%）；进出口关税与自贸协定优惠；外国承包商税（FCT）；转让定价合规；利润汇出与外汇管制；社保对成本的影响。
所有税率/门槛标为「参考」，提示以最新法规（财政部/总税务局）与持牌税务师测算为准。能用简表对比不同优惠情形。中文、量化、可执行。不构成正式税务意见。`
  },
  {
    id:"site-park", emoji:"🏭", name:"选址与工业园区顾问",
    tag:"北中南三区 · VSIP/DEEP C · 地价基建",
    scope:"北部（海防/北宁/北江/兴安，电子）、南部（胡志明/平阳/同奈/隆安）、中部（岘港/广南）的区位、地价、基建、港口与人力对比，VSIP/DEEP C 等园区选择。",
    sys:`你是越南「选址与工业园区顾问」。掌握三大区域产业格局与园区生态：北部（海防、北宁、北江、兴安——电子/3C 供应链、近中国与凯莱港）、南部（胡志明、平阳、同奈、隆安——综合制造、近吉莱/盖梅港）、中部（岘港、广南——成本与政策洼地）；VSIP、DEEP C、Amata、龙江等园区；厂房租赁 vs 自建、地价与管理费参考区间、电力/供水/物流/用工可得性、港口距离与通关。
按「行业匹配 → 候选区域 → 园区短名单 → 落地要点」组织回答，给参考数字并提示实地考察核实。中文、对比清晰。`
  },
  {
    id:"hr-labor", emoji:"👥", name:"人力资源与用工顾问",
    tag:"劳动法 · 最低工资 · 社保 · 工签",
    scope:"四档地区最低工资、社保（雇主约 21.5%）、劳动合同、工时加班、工会、外国人工作许可与居留、招聘与用工成本测算。",
    sys:`你是越南「人力资源与用工顾问」。精通越南劳动法：四档地区最低工资（Region I–IV）、社会保险/医疗/失业保险雇主缴费合计约 21.5%、劳动合同类型与试用期、工时与加班上限、工会与集体协商、解雇与遣散；外国人工作许可（Work Permit）与临时居留卡（TRC）办理；招聘渠道与蓝领/技工/管理层薪资参考、用工总成本测算。
给出可落地的用工成本表与合规清单，数字标为参考并提示以最新法规与当地实践为准。中文、务实。`
  },
  {
    id:"supply-chain", emoji:"🚚", name:"供应链与物流贸易顾问",
    tag:"FTA · 原产地 · 港口 · 关务",
    scope:"CPTPP/EVFTA/RCEP/UKVFTA 等自贸协定与原产地规则、本地化率、主要港口（吉莱/海防/盖梅）、保税与加工出口企业（EPE）、进出口关务与物流成本。",
    sys:`你是越南「供应链与物流贸易顾问」。熟悉越南对外贸易网络：CPTPP、EVFTA、RCEP、UKVFTA 等自贸协定的关税优惠与原产地规则（RoO）、区域价值成分与本地化率门槛；加工出口企业（EPE）与保税区的税务优势；主要港口与航线（吉莱 Cat Lai、海防 Hai Phong、盖梅 Cai Mep）；进出口报关、HS 归类、物流成本与交期；上游零部件本地配套现状与缺口。
帮助企业判断「如何用越南制造+自贸协定撬动欧美市场关税优势」。给参考数据并提示以最新协定文本与海关规则为准。中文、贸易视角清晰。`
  },
];
const ADV_MAP = Object.fromEntries(ADVISORS.map(a=>[a.id,a]));

/* ============================ 状态 ============================ */
const LS = "vn_advisor_state_v1";
let state = { view:"goal", advisor:ADVISORS[0].id, model:"claude-opus-4-8", accessCode:"", convos:{}, plan:null, goalForm:{} };
try{ const s=JSON.parse(localStorage.getItem(LS)); if(s) state={...state,...s}; }catch{}
function save(){ try{ localStorage.setItem(LS, JSON.stringify(state)); }catch{} }

const $ = s=>document.querySelector(s);
const view = $("#view");
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),3200); }
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* 轻量 markdown 渲染（先转义） */
function md(src){
  let t = esc(src);
  // 代码块
  t = t.replace(/```([\s\S]*?)```/g, (_,c)=>`<pre style="background:var(--paper-2);padding:10px;border-radius:8px;overflow:auto;font-size:12.5px">${c.trim()}</pre>`);
  // 表格
  t = t.replace(/(^\|.*\|\s*\n\|[\s:|-]+\|\s*\n(?:\|.*\|\s*\n?)+)/gm, block=>{
    const rows = block.trim().split("\n").filter(r=>r.trim());
    const head = rows[0].split("|").slice(1,-1).map(c=>`<th>${c.trim()}</th>`).join("");
    const body = rows.slice(2).map(r=>"<tr>"+r.split("|").slice(1,-1).map(c=>`<td>${c.trim()}</td>`).join("")+"</tr>").join("");
    return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  });
  t = t.replace(/^### (.*)$/gm,"<h4>$1</h4>").replace(/^## (.*)$/gm,"<h3>$1</h3>").replace(/^# (.*)$/gm,"<h3>$1</h3>");
  t = t.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  t = t.replace(/`([^`]+)`/g,"<code>$1</code>");
  // 列表
  t = t.replace(/(?:^|\n)((?:\s*[-*] .*(?:\n|$))+)/g, (_,b)=>{
    const items=b.trim().split("\n").map(l=>"<li>"+l.replace(/^\s*[-*]\s+/,"")+"</li>").join("");
    return "\n<ul>"+items+"</ul>";
  });
  t = t.replace(/(?:^|\n)((?:\s*\d+\. .*(?:\n|$))+)/g, (_,b)=>{
    const items=b.trim().split("\n").map(l=>"<li>"+l.replace(/^\s*\d+\.\s+/,"")+"</li>").join("");
    return "\n<ol>"+items+"</ol>";
  });
  t = t.split(/\n{2,}/).map(p=>/^\s*<(h3|h4|ul|ol|pre|table)/.test(p)?p:`<p>${p.replace(/\n/g,"<br>")}</p>`).join("");
  return t;
}

/* ============================ 导航 ============================ */
function renderNav(){
  const nav = $("#nav");
  nav.innerHTML = `
    <div class="nav-label">目标驱动</div>
    <div class="nav-item ${state.view==='goal'?'active':''}" data-go="goal">
      <span class="ic">🎯</span><div><div class="tt">目标工作台</div><div class="sub">目标 → 落地路线图</div></div>
    </div>
    <div class="nav-label">专业顾问</div>
    ${ADVISORS.map(a=>`
      <div class="nav-item ${state.view==='chat'&&state.advisor===a.id?'active':''}" data-adv="${a.id}">
        <span class="ic">${a.emoji}</span><div><div class="tt">${a.name.replace('顾问','').replace('与','·')}</div><div class="sub">${a.tag}</div></div>
      </div>`).join("")}
  `;
  nav.querySelectorAll("[data-go]").forEach(e=>e.onclick=()=>{ state.view="goal"; render(); });
  nav.querySelectorAll("[data-adv]").forEach(e=>e.onclick=()=>{ state.view="chat"; state.advisor=e.dataset.adv; render(); });
}

function setTopbar(emoji,title,desc){ $("#tbEmoji").textContent=emoji; $("#tbTitle").textContent=title; $("#tbDesc").textContent=desc; }

/* ============================ 渲染分发 ============================ */
function render(){
  renderNav(); save();
  document.getElementById('sidebar').classList.remove('open');
  $("#modelSel").value = state.model;
  $("#accessCode").value = state.accessCode || "";
  if(state.view==="goal") renderGoal(); else renderChat();
}

/* ============================ 目标工作台 ============================ */
const GOAL_EXAMPLES = [
  "在越南北部建电子代工厂，预算 800 万美元，主供应苹果链",
  "把家居品牌通过越南制造出口欧美，规避关税",
  "在胡志明设区域总部并布局电商与本地零售",
  "新能源汽车零部件落地越南，服务区域整车厂",
];
function renderGoal(){
  setTopbar("🎯","目标工作台","输入出海目标，Claude 拆解为可执行落地路线图");
  const f = state.goalForm;
  view.innerHTML = `
    <div class="hero">
      <div class="kicker">Goal-Driven Strategy</div>
      <h3 class="serif">把一个出海目标，变成一张落地路线图</h3>
      <p>描述你的越南出海目标与画像，首席顾问会拆解为阶段计划、关键风险、可争取的优惠、落地清单，并推荐应优先咨询的专业顾问。</p>
      <div class="form-grid">
        <div class="full">
          <label class="lbl">出海目标 *</label>
          <textarea class="inp" id="g_goal" placeholder="例：在越南北部建电子代工厂，预算 800 万美元，12 个月内投产…">${f.goal?esc(f.goal):""}</textarea>
        </div>
        <div><label class="lbl">行业</label><input class="inp" id="g_industry" placeholder="如 电子制造 / 纺织 / 家居" value="${f.industry?esc(f.industry):""}"></div>
        <div><label class="lbl">预算</label><input class="inp" id="g_budget" placeholder="如 500-1000 万美元" value="${f.budget?esc(f.budget):""}"></div>
        <div>
          <label class="lbl">区域偏好</label>
          <select class="inp" id="g_region">
            ${["不限","北部（海防/北宁/北江）","南部（胡志明/平阳/同奈）","中部（岘港/广南）"].map(r=>`<option ${f.region===r?'selected':''}>${r}</option>`).join("")}
          </select>
        </div>
        <div>
          <label class="lbl">当前阶段</label>
          <select class="inp" id="g_stage">
            ${["初步调研","已决定出海，选址中","已选址，准备落地","已落地，扩张优化"].map(s=>`<option ${f.stage===s?'selected':''}>${s}</option>`).join("")}
          </select>
        </div>
      </div>
      <div class="examples">${GOAL_EXAMPLES.map(e=>`<span class="chip" data-ex="${esc(e)}">${esc(e)}</span>`).join("")}</div>
      <div style="margin-top:18px; display:flex; gap:10px; align-items:center">
        <button class="btn gold" id="runGoal">⚡ 生成落地路线图</button>
        ${state.plan?'<button class="btn ghost sm" id="clearPlan">清空结果</button>':''}
      </div>
    </div>
    <div id="planArea">${state.plan?renderPlanHTML(state.plan):""}</div>
    <div class="disclaimer">本平台基于 Claude 生成，内容仅供出海决策参考，不构成法律、税务或投资意见。落地前请与持牌专业机构核实最新政策。</div>
  `;
  view.querySelectorAll("[data-ex]").forEach(c=>c.onclick=()=>{ $("#g_goal").value=c.dataset.ex; });
  $("#runGoal").onclick=runGoal;
  if($("#clearPlan")) $("#clearPlan").onclick=()=>{ state.plan=null; render(); };
}

function collectGoalForm(){
  state.goalForm = {
    goal: $("#g_goal").value.trim(), industry: $("#g_industry").value.trim(),
    budget: $("#g_budget").value.trim(), region: $("#g_region").value, stage: $("#g_stage").value,
  };
  return state.goalForm;
}

async function runGoal(){
  const f = collectGoalForm();
  if(!f.goal || f.goal.length<4){ toast("请先填写出海目标"); return; }
  save();
  $("#runGoal").disabled=true; $("#runGoal").textContent="⏳ 首席顾问拆解中…";
  $("#planArea").innerHTML=`<div class="loading-plan"><div class="spin"></div>正在分析目标、拆解阶段、识别风险与优惠…<br><span style="font-size:11px">（Opus 深度推演约需 20–40 秒）</span></div>`;
  try{
    const res = await fetch("/api/goal",{
      method:"POST", headers:{"Content-Type":"application/json","x-access-code":state.accessCode||""},
      body:JSON.stringify({...f, region:f.region==="不限"?"":f.region, model:state.model}),
    });
    const data = await res.json();
    if(!res.ok){ toast(data.error||"生成失败"); $("#planArea").innerHTML=""; return; }
    state.plan=data.plan; save();
    $("#planArea").innerHTML=renderPlanHTML(data.plan);
    bindPlanActions();
  }catch(e){ toast("网络错误："+e.message); $("#planArea").innerHTML=""; }
  finally{ const b=$("#runGoal"); if(b){ b.disabled=false; b.textContent="⚡ 生成落地路线图"; } if(!$("#clearPlan")) renderGoalButtons(); }
}
function renderGoalButtons(){ /* 重渲染以显示清空按钮 */ if(state.plan) renderGoal(), bindPlanActions(); }

function renderPlanHTML(p){
  const phase = (ph,i)=>`
    <div class="phase">
      <div class="num">${i+1}</div>
      <div class="body">
        <div><span class="pn">${esc(ph.name||"")}</span><span class="tf">${esc(ph.timeframe||"")}</span></div>
        <div class="obj">${esc(ph.objective||"")}</div>
        ${(ph.keyActions&&ph.keyActions.length)?`<ul>${ph.keyActions.map(a=>`<li>${esc(a)}</li>`).join("")}</ul>`:""}
        ${(ph.advisors&&ph.advisors.length)?`<div class="adv-tags">${ph.advisors.filter(id=>ADV_MAP[id]).map(id=>`<span class="adv-tag" data-adv="${id}">${ADV_MAP[id].emoji} ${ADV_MAP[id].name.replace('顾问','')}</span>`).join("")}</div>`:""}
      </div>
    </div>`;
  return `
  <div class="plan-card">
    <div class="plan-head">
      <div class="summary">${esc(p.summary||"")}</div>
      ${p.feasibility?`<div class="feas">可行性：${esc(p.feasibility)}</div>`:""}
    </div>
    <div class="plan-body">
      ${(p.phases&&p.phases.length)?`<div class="sec"><h4>落地阶段</h4>${p.phases.map(phase).join("")}</div>`:""}
      ${(p.keyRisks&&p.keyRisks.length)?`<div class="sec"><h4>关键风险与对策</h4>${p.keyRisks.map(r=>`<div class="risk"><div class="r">⚠ ${esc(r.risk||"")}</div><div class="m">${esc(r.mitigation||"")}</div></div>`).join("")}</div>`:""}
      ${(p.incentives&&p.incentives.length)?`<div class="sec"><h4>可争取的优惠政策</h4><div class="pill-list">${p.incentives.map(x=>`<span class="pill">🎁 ${esc(x)}</span>`).join("")}</div></div>`:""}
      ${(p.checklist&&p.checklist.length)?`<div class="sec"><h4>落地清单</h4>${p.checklist.map(c=>`<div class="check"><span class="bx"></span><span>${esc(c)}</span></div>`).join("")}</div>`:""}
      ${(p.recommendedAdvisors&&p.recommendedAdvisors.length)?`<div class="sec"><h4>建议优先咨询</h4>${p.recommendedAdvisors.filter(r=>ADV_MAP[r.id]).map(r=>`<div class="rec-adv"><div class="e">${ADV_MAP[r.id].emoji}</div><div class="t"><div class="n">${ADV_MAP[r.id].name}</div><div class="r">${esc(r.reason||"")}</div></div><button class="btn sm" data-adv="${r.id}">咨询 →</button></div>`).join("")}</div>`:""}
      ${p.nextStep?`<div class="next-step"><div class="l">立即可做的第一步</div><div class="v">${esc(p.nextStep)}</div></div>`:""}
      ${p.estimatedTimeline?`<div class="timeline-badge">⏱ 整体时间预估：${esc(p.estimatedTimeline)}</div>`:""}
    </div>
  </div>`;
}
function bindPlanActions(){
  view.querySelectorAll("[data-adv]").forEach(b=>b.onclick=()=>{ state.view="chat"; state.advisor=b.dataset.adv; render(); });
}

/* ============================ 顾问对话 ============================ */
function renderChat(){
  const a = ADV_MAP[state.advisor];
  setTopbar(a.emoji, a.name, a.tag);
  const conv = state.convos[a.id] || [];
  view.innerHTML = `
    <div class="agent-banner">
      <div class="row"><div class="e">${a.emoji}</div><div><h3 class="serif">${a.name}</h3><div class="tag">${a.tag}</div></div>
        ${conv.length?'<button class="btn ghost sm" id="clearConv" style="margin-left:auto">清空对话</button>':''}
      </div>
      <div class="scope"><strong>擅长：</strong>${a.scope}</div>
    </div>
    <div class="msgs" id="msgs">${conv.map(m=>msgHTML(m,a)).join("")||emptyChat(a)}</div>
    <div class="composer">
      <div class="box">
        <textarea id="inp" rows="1" placeholder="向${a.name.replace('顾问','')}提问…（Enter 发送 / Shift+Enter 换行）"></textarea>
        <button class="btn" id="send">发送</button>
      </div>
      <div class="disclaimer">内容由 Claude 生成，仅供参考，不构成专业意见。</div>
    </div>
  `;
  const inp=$("#inp");
  inp.oninput=()=>{ inp.style.height="auto"; inp.style.height=Math.min(inp.scrollHeight,140)+"px"; };
  inp.onkeydown=e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendChat(); } };
  $("#send").onclick=sendChat;
  if($("#clearConv")) $("#clearConv").onclick=()=>{ state.convos[a.id]=[]; render(); };
  scrollMsgs();
  inp.focus();
}
function emptyChat(a){ return `<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px">${a.emoji} 你好，我是${a.name}。<br>把你的具体情况告诉我，我会给出贴合越南实际的建议。</div>`; }
function msgHTML(m,a){
  const av = m.role==="user"?"你":a.emoji;
  return `<div class="msg ${m.role==='user'?'u':'a'}"><div class="av">${m.role==='user'?'🧑':a.emoji}</div><div class="bubble">${m.role==='user'?esc(m.content).replace(/\n/g,"<br>"):md(m.content)}</div></div>`;
}
function scrollMsgs(){ const c=$(".content"); c.scrollTop=c.scrollHeight; }

async function sendChat(){
  const a = ADV_MAP[state.advisor];
  const inp=$("#inp"); const text=inp.value.trim();
  if(!text) return;
  if(!state.convos[a.id]) state.convos[a.id]=[];
  state.convos[a.id].push({role:"user",content:text});
  inp.value=""; inp.style.height="auto";
  const msgs=$("#msgs");
  if(msgs.querySelector("div[style]")&&state.convos[a.id].length===1) msgs.innerHTML="";
  msgs.insertAdjacentHTML("beforeend", msgHTML({role:"user",content:text},a));
  msgs.insertAdjacentHTML("beforeend", `<div class="msg a" id="pending"><div class="av">${a.emoji}</div><div class="bubble"><span class="typing"><span></span><span></span><span></span></span></div></div>`);
  scrollMsgs(); save();
  $("#send").disabled=true;

  // 仅取最近 12 轮，控制 token
  const history = state.convos[a.id].slice(-24).map(m=>({role:m.role,content:m.content}));
  try{
    const res = await fetch("/api/chat",{
      method:"POST", headers:{"Content-Type":"application/json","x-access-code":state.accessCode||""},
      body:JSON.stringify({messages:history, system:a.sys, model:state.model}),
    });
    const data=await res.json();
    const pend=$("#pending"); if(pend) pend.remove();
    if(!res.ok){ toast(data.error||"请求失败"); state.convos[a.id].pop(); save(); $("#send").disabled=false; renderChat(); return; }
    const reply=(data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("").trim()||"（无回复）";
    state.convos[a.id].push({role:"assistant",content:reply});
    save();
    $("#msgs").insertAdjacentHTML("beforeend", msgHTML({role:"assistant",content:reply},a));
    scrollMsgs();
  }catch(e){ const p=$("#pending"); if(p)p.remove(); toast("网络错误："+e.message); }
  finally{ if($("#send")) $("#send").disabled=false; }
}

/* ============================ 全局设置 ============================ */
$("#modelSel").onchange=e=>{ state.model=e.target.value; save(); toast("已切换模型：" + e.target.options[e.target.selectedIndex].text.split("·")[0].trim()); };
$("#accessCode").oninput=e=>{ state.accessCode=e.target.value.trim(); save(); };

render();
</script>
